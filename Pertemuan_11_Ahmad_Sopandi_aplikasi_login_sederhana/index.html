<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login CRUD - Pertemuan 11 | Ahmad Sopandi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            color: white;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-size: 1.8rem;
        }

        .header p {
            color: rgba(255,255,255,0.9);
            margin-top: 0.8rem;
        }

        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 1.8rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .form-card {
            flex: 1;
            min-width: 280px;
        }

        .list-card {
            flex: 2;
            min-width: 350px;
        }

        .card h2 {
            margin-bottom: 1.5rem;
            color: #333;
            border-left: 4px solid #667eea;
            padding-left: 1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 0.7rem;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 0.95rem;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 0.7rem 1.2rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover { background: #5a67d8; }

        .btn-danger {
            background: #f56565;
            color: white;
        }
        .btn-danger:hover { background: #e53e3e; }

        .btn-warning {
            background: #ed8936;
            color: white;
        }
        .btn-warning:hover { background: #dd6b20; }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-secondary {
            background: #a0aec0;
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 0.8rem;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f7fafc;
            color: #333;
        }

        tr:hover {
            background: #f7fafc;
        }

        .badge {
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-admin { background: #fed7d7; color: #9b2c2c; }
        .badge-user { background: #bee3f8; color: #2c5282; }
        .badge-editor { background: #c6f6d5; color: #22543d; }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .search-bar {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .search-bar input {
            flex: 2;
            min-width: 180px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .empty-row td {
            text-align: center;
            padding: 2rem;
            color: #999;
        }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .card { padding: 1.2rem; }
            th, td { padding: 0.5rem; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔐 Aplikasi Login CRUD</h1>
        <p>Pertemuan 11 | Ahmad Sopandi | Modular, Reuse, Responsive</p>
    </div>

    <div class="dashboard">
        <div class="card form-card">
            <h2 id="formTitle">➕ Tambah User</h2>
            <form id="userForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>👤 Nama Lengkap</label>
                    <input type="text" id="fullname" required>
                </div>
                <div class="form-group">
                    <label>🔒 Password</label>
                    <input type="password" id="password" placeholder="Min 4 karakter" required>
                </div>
                <div class="form-group">
                    <label>⭐ Role</label>
                    <select id="role">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                        <option value="editor">Editor</option>
                    </select>
                </div>
                <div style="display: flex; gap: 0.8rem;">
                    <button type="submit" class="btn btn-primary" id="submitBtn">💾 Simpan</button>
                    <button type="button" class="btn btn-secondary" id="resetBtn">🔄 Reset</button>
                </div>
            </form>
        </div>

        <div class="card list-card">
            <h2>📋 Daftar Users</h2>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 Cari nama atau email...">
                <button id="refreshBtn" class="btn btn-success">🔄 Refresh</button>
            </div>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr><th>ID</th><th>Email</th><th>Nama</th><th>Role</th><th>Aksi</th></tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr><td colspan="5" class="empty-row">⏳ Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let users = [];
    let currentEditId = null;
    let searchKeyword = '';

    function showToast(msg, isError = false) {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        toast.style.backgroundColor = isError ? '#f56565' : '#48bb78';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function getBadgeClass(role) {
        return role === 'admin' ? 'badge-admin' : role === 'editor' ? 'badge-editor' : 'badge-user';
    }

    async function loadUsers() {
        try {
            const res = await fetch('users.json');
            if (!res.ok) throw new Error();
            const data = await res.json();
            if (data.length) users = data;
            else users = getDefaultUsers();
        } catch (e) {
            users = getDefaultUsers();
            showToast('Menggunakan data default', true);
        }
        renderTable();
    }

    function getDefaultUsers() {
        return [
            { id: 1, email: "admin@example.com", fullname: "Administrator", password: "admin123", role: "admin" },
            { id: 2, email: "user@example.com", fullname: "Regular User", password: "user123", role: "user" },
            { id: 3, email: "editor@example.com", fullname: "Content Editor", password: "editor123", role: "editor" }
        ];
    }

    function renderTable() {
        const tbody = document.getElementById('userTableBody');
        let filtered = users.filter(u => 
            u.fullname.toLowerCase().includes(searchKeyword.toLowerCase()) ||
            u.email.toLowerCase().includes(searchKeyword.toLowerCase())
        );
        
        if (!filtered.length) {
            tbody.innerHTML = '<tr class="empty-row"><td colspan="5">📭 Tidak ada user</td></tr>';
            return;
        }
        
        tbody.innerHTML = filtered.map(u => `
            <tr>
                <td>${u.id}</td>
                <td>${escapeHtml(u.email)}</td>
                <td><strong>${escapeHtml(u.fullname)}</strong></td>
                <td><span class="badge ${getBadgeClass(u.role)}">${u.role}</span></td>
                <td class="action-buttons">
                    <button class="btn btn-warning" onclick="editUser(${u.id})">✏️ Edit</button>
                    <button class="btn btn-danger" onclick="deleteUser(${u.id})">🗑 Hapus</button>
                </td>
            </tr>
        `).join('');
    }

    function resetForm() {
        document.getElementById('userForm').reset();
        document.getElementById('editId').value = '';
        currentEditId = null;
        document.getElementById('formTitle').innerHTML = '➕ Tambah User';
        document.getElementById('submitBtn').innerHTML = '💾 Simpan';
        document.getElementById('password').required = true;
    }

    function isEmailUnique(email, excludeId = null) {
        return !users.some(u => u.email === email && u.id !== excludeId);
    }

    function saveUser(e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const fullname = document.getElementById('fullname').value.trim();
        const password = document.getElementById('password').value;
        const role = document.getElementById('role').value;
        const editId = document.getElementById('editId').value;

        if (!email || !fullname || !password) {
            showToast('Lengkapi semua field!', true);
            return;
        }
        if (password.length < 4) {
            showToast('Password minimal 4 karakter!', true);
            return;
        }

        if (!editId) {
            if (!isEmailUnique(email)) {
                showToast('Email sudah terdaftar!', true);
                return;
            }
            const newId = users.length ? Math.max(...users.map(u => u.id)) + 1 : 1;
            users.push({ id: newId, email, fullname, password, role });
            showToast(`User ${fullname} ditambahkan`);
        } else {
            const idx = users.findIndex(u => u.id === parseInt(editId));
            if (!isEmailUnique(email, parseInt(editId))) {
                showToast('Email sudah digunakan!', true);
                return;
            }
            users[idx] = { ...users[idx], email, fullname, password, role };
            showToast(`User ${fullname} diupdate`);
        }
        resetForm();
        renderTable();
    }

    window.editUser = (id) => {
        const user = users.find(u => u.id === id);
        if (!user) return;
        document.getElementById('editId').value = id;
        document.getElementById('email').value = user.email;
        document.getElementById('fullname').value = user.fullname;
        document.getElementById('password').value = user.password;
        document.getElementById('role').value = user.role;
        document.getElementById('formTitle').innerHTML = '✏️ Edit User';
        document.getElementById('submitBtn').innerHTML = '🔄 Update';
        document.getElementById('password').required = false;
        showToast(`Mengedit: ${user.fullname}`);
    };

    window.deleteUser = (id) => {
        const user = users.find(u => u.id === id);
        if (confirm(`Hapus "${user?.fullname}"?`)) {
            users = users.filter(u => u.id !== id);
            if (currentEditId === id) resetForm();
            renderTable();
            showToast(`User ${user?.fullname} dihapus`);
        }
    };

    document.getElementById('userForm').addEventListener('submit', saveUser);
    document.getElementById('resetBtn').addEventListener('click', resetForm);
    document.getElementById('refreshBtn').addEventListener('click', () => renderTable());
    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchKeyword = e.target.value;
        renderTable();
    });

    loadUsers();
</script>
</body>
</html>
