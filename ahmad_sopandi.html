<script>
const STORAGE_KEY = "users";

const columns = ["id","user","nama","sandi","status"];

let selectedIndex = -1;

function getData() {
    try {
        const data = localStorage.getItem(STORAGE_KEY);

        if (data) {
            return JSON.parse(data);
        }

        const defaultData = [
            {
                id: "1",
                user: "admin",
                nama: "Administrator",
                sandi: "admin",
                status: "Aktif"
            }
        ];

        localStorage.setItem(
            STORAGE_KEY,
            JSON.stringify(defaultData)
        );

        return defaultData;

    } catch (e) {
        console.error(e);
        return [];
    }
}

function saveData(data){
    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(data)
    );
}

function renderTable(){

    const data = getData();

    let html = `
        <thead>
            <tr>
                ${columns.map(col => `<th>${col.toUpperCase()}</th>`).join("")}
            </tr>
        </thead>
        <tbody>
    `;

    data.forEach((row,index)=>{
        html += `
        <tr onclick="selectRow(${index})">
            ${columns.map(col => `<td>${row[col] || ""}</td>`).join("")}
        </tr>
        `;
    });

    html += "</tbody>";

    document.getElementById("dataTable").innerHTML = html;
}

function selectRow(index){

    selectedIndex = index;

    const row = getData()[index];

    columns.forEach(col=>{
        const el = document.getElementById(col);
        if(el){
            el.value = row[col] || "";
        }
    });

    document
    .querySelectorAll("#dataTable tbody tr")
    .forEach(r=>r.classList.remove("selected"));

    const selected =
    document.querySelectorAll("#dataTable tbody tr")[index];

    if(selected){
        selected.classList.add("selected");
    }
}

function getFormData(){

    const obj = {};

    columns.forEach(col=>{
        obj[col] = document.getElementById(col).value;
    });

    return obj;
}

function addData(){

    const data = getData();

    data.push(getFormData());

    saveData(data);

    renderTable();

    clearForm();
}

function updateData(){

    if(selectedIndex === -1){
        alert("Pilih data terlebih dahulu");
        return;
    }

    const data = getData();

    data[selectedIndex] = getFormData();

    saveData(data);

    renderTable();
}

function deleteData(){

    if(selectedIndex === -1){
        alert("Pilih data terlebih dahulu");
        return;
    }

    const data = getData();

    data.splice(selectedIndex,1);

    saveData(data);

    renderTable();

    clearForm();
}

function clearForm(){

    columns.forEach(col=>{

        const el = document.getElementById(col);

        if(el){
            el.value = "";
        }

    });

    document.getElementById("status").value = "Aktif";

    selectedIndex = -1;
}

function login(){

    const username =
        document.getElementById("loginUser").value;

    const password =
        document.getElementById("loginPass").value;

    const user = getData().find(
        u =>
        u.user === username &&
        u.sandi === password &&
        u.status === "Aktif"
    );

    if(user){

        document
        .getElementById("loginPage")
        .classList.add("hidden");

        document
        .getElementById("crudPage")
        .classList.remove("hidden");

        renderTable();

    }else{

        alert("Login gagal!");
    }
}

window.onload = function(){
    getData();
};
</script>
